name = "matrix_mortality"
version = "0.1.0"
defaultTargets = ["MatrixMortality"]
leanOptions = {warningAsError = true, autoImplicit = false, pp.unicode.fun = true, linter.docPrime = true, linter.hashCommand = true, linter.oldObtain = true, linter.refine = true, linter.style.cdot = true, linter.style.dollarSyntax = true, linter.style.lambdaSyntax = true, linter.style.longFile = 1000, linter.style.longLine = true, linter.style.missingEnd = true, linter.style.setOption = true}

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.12.0"

[[lean_lib]]
name = "MatrixMortality"
